<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>NovaTools | Dashboard</title>
    <style>
        body { 
            background-color: #0a0a0a; 
            color: #00ff41; 
            font-family: 'Courier New', Courier, monospace; 
            display: flex; 
            flex-direction: column;
            align-items: center; 
            justify-content: center; 
            height: 100vh; 
            margin: 0; 
            overflow: hidden;
        }
        .matrix-bg {
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            z-index: -1;
            opacity: 0.1;
        }
        .panel {
            border: 2px solid #00ff41;
            padding: 40px;
            background: rgba(0, 20, 0, 0.8);
            box-shadow: 0 0 20px #00ff41;
            text-align: center;
        }
        h1 { font-size: 2.5em; text-transform: uppercase; letter-spacing: 5px; margin-bottom: 10px; }
        .status { font-size: 1.2em; margin-bottom: 20px; border-bottom: 1px solid #00ff41; display: inline-block; }
        .blink { animation: blinker 1s linear infinite; }
        @keyframes blinker { 50% { opacity: 0; } }
    </style>
</head>
<body>
    <div class="panel">
        <h1>NOVATOOLS</h1>
        <div class="status">> SYSTEM STATUS: <span class="blink">LOADING...</span></div>
        <p>Hoş geldin Lurexa.</p>
        <p>Cybersecurity projeleri ve checker araçları yakında burada aktif edilecek.</p>
    </div>
</body>
</html>
